<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DIGO CARD GAME</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- WHOLE GAME AREA -->
  <div id="gameContainer">

    <!-- ENEMY AREA -->
    <div id="enemyArea">
      <h2>Enemy Bot</h2>

      <div class="enemyCards">
        <div class="enemyCard"></div>
        <div class="enemyCard"></div>
        <div class="enemyCard"></div>
      </div>
    </div>

    <!-- TABLE -->
    <div id="tableArea">

      <!-- DRAW PILE -->
      <div id="deckPile">
        <p>Deck</p>
      </div>

      <!-- CENTER PLAYED CARD -->
      <div id="playedCard">
        <p>Play Area</p>
      </div>

      <!-- DISCARD -->
      <div id="discardPile">
        <p>Discard</p>
      </div>

    </div>

    <!-- PLAYER AREA -->
    <div id="playerArea">
      <h2>You</h2>

      <div id="hand"></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
